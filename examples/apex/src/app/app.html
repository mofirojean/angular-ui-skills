<div class="bg-background text-foreground flex h-screen w-screen overflow-hidden">
  <app-sidebar [mode]="mode()" />

  <main class="flex min-w-0 flex-1 flex-col">
    <router-outlet />
  </main>

  <button
    type="button"
    (click)="toggleTheme()"
    [attr.aria-label]="modeLabel()"
    class="border-border bg-card hover:bg-accent text-muted-foreground hover:text-foreground fixed bottom-4 right-4 z-50 flex h-9 w-9 items-center justify-center rounded-full border shadow-sm transition-colors"
  >
    <ng-icon hlm [name]="modeIcon()" size="sm" />
  </button>
</div>
