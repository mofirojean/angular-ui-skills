<header class="border-border flex items-center gap-2 border-b px-3 py-2">
  <div class="min-w-0 flex-1">
    <p class="text-muted-foreground font-mono text-[10px] uppercase tracking-wider leading-none">
      {{ typeLabel() }} · artifact
    </p>
    <h2 class="text-foreground mt-0.5 truncate text-[13px] font-medium leading-tight">
      {{ artifact().title }}
    </h2>
  </div>

  @if (canPreview()) {
    <div class="border-border bg-muted/50 flex h-7 items-center gap-px overflow-hidden rounded-md border p-0.5 text-[11px]">
      <button
        type="button"
        (click)="setTab('preview')"
        [class.bg-background]="activeTab() === 'preview'"
        [class.text-foreground]="activeTab() === 'preview'"
        [class.shadow-sm]="activeTab() === 'preview'"
        class="text-muted-foreground hover:text-foreground rounded-[5px] px-2.5 py-0.5 font-medium transition-colors"
      >
        Preview
      </button>
      <button
        type="button"
        (click)="setTab('code')"
        [class.bg-background]="activeTab() === 'code'"
        [class.text-foreground]="activeTab() === 'code'"
        [class.shadow-sm]="activeTab() === 'code'"
        class="text-muted-foreground hover:text-foreground rounded-[5px] px-2.5 py-0.5 font-medium transition-colors"
      >
        Code
      </button>
    </div>
  }

  <button hlmBtn variant="ghost" size="sm" class="h-8 w-8 p-0" type="button" (click)="copy()" aria-label="Copy">
    <ng-icon hlm name="lucideCopy" size="xs" />
  </button>
  <button hlmBtn variant="ghost" size="sm" class="h-8 w-8 p-0" type="button" (click)="download()" aria-label="Download">
    <ng-icon hlm name="lucideArchive" size="xs" />
  </button>
  <button
    hlmBtn
    variant="ghost"
    size="sm"
    class="h-8 w-8 p-0"
    type="button"
    (click)="toggleFullscreen.emit()"
    [attr.aria-label]="fullscreen() ? 'Exit fullscreen' : 'Fullscreen'"
  >
    <ng-icon hlm [name]="fullscreen() ? 'lucideX' : 'lucidePanelLeft'" size="xs" />
  </button>
  <button hlmBtn variant="ghost" size="sm" class="h-8 w-8 p-0" type="button" (click)="close.emit()" aria-label="Close">
    <ng-icon hlm name="lucideX" size="xs" />
  </button>
</header>

<div class="min-h-0 flex-1 overflow-hidden">
  @if (activeTab() === 'preview' && canPreview()) {
    @switch (artifact().type) {
      @case ('html') {
        <iframe
          [srcdoc]="previewSrcDoc()"
          sandbox="allow-same-origin"
          class="block h-full w-full bg-white"
          title="Artifact preview"
        ></iframe>
      }
      @case ('markdown') {
        <div class="h-full overflow-y-auto">
          <div class="apex-prose font-serif text-foreground mx-auto max-w-2xl px-6 py-8 text-[15px] leading-[1.7]">
            <markdown [data]="artifact().content"></markdown>
          </div>
        </div>
      }
    }
  } @else {
    <div class="h-full overflow-y-auto bg-[#1f1c1a]">
      <pre class="px-5 py-4 font-mono text-[12.5px] leading-[1.55] text-zinc-100"><code>{{ artifact().content }}</code></pre>
    </div>
  }
</div>
