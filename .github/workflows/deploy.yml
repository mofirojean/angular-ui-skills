name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      target:
        description: Which app to deploy
        type: choice
        options:
          - all
          - docs
          - mission-control
          - quanta-desk
          - apex
          - switchboard
          - roster
          - forge
        default: all

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  changes:
    name: Plan deploys
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      any: ${{ steps.plan.outputs.any }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - 'docs/**'
              - '.github/workflows/deploy.yml'
            mission-control:
              - 'examples/mission-control/**'
              - '.github/workflows/deploy.yml'
            quanta-desk:
              - 'examples/quanta-desk/**'
              - '.github/workflows/deploy.yml'
            apex:
              - 'examples/apex/**'
              - '.github/workflows/deploy.yml'
            switchboard:
              - 'examples/switchboard/**'
              - '.github/workflows/deploy.yml'
            roster:
              - 'examples/roster/**'
              - '.github/workflows/deploy.yml'
            forge:
              - 'examples/forge/**'
              - '.github/workflows/deploy.yml'

      - name: Build deploy matrix
        id: plan
        env:
          DOCS: ${{ steps.filter.outputs.docs }}
          MC: ${{ steps.filter.outputs.mission-control }}
          QD: ${{ steps.filter.outputs.quanta-desk }}
          APEX: ${{ steps.filter.outputs.apex }}
          SB: ${{ steps.filter.outputs.switchboard }}
          ROSTER: ${{ steps.filter.outputs.roster }}
          FORGE: ${{ steps.filter.outputs.forge }}
          EVENT: ${{ github.event_name }}
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail

          should_run() {
            local app="$1"
            local changed="$2"
            if [[ "$EVENT" == "workflow_dispatch" ]]; then
              if [[ "$TARGET" == "all" || "$TARGET" == "$app" ]]; then return 0; else return 1; fi
            fi
            if [[ "$changed" == "true" ]]; then return 0; else return 1; fi
          }

          items=()
          if should_run docs "$DOCS"; then
            items+=('{"app":"docs","path":"docs","project_id_name":"VERCEL_PROJECT_ID_DOCS"}')
          fi
          if should_run mission-control "$MC"; then
            items+=('{"app":"mission-control","path":"examples/mission-control","project_id_name":"VERCEL_PROJECT_ID_MISSION_CONTROL"}')
          fi
          if should_run quanta-desk "$QD"; then
            items+=('{"app":"quanta-desk","path":"examples/quanta-desk","project_id_name":"VERCEL_PROJECT_ID_QUANTA_DESK"}')
          fi
          if should_run apex "$APEX"; then
            items+=('{"app":"apex","path":"examples/apex","project_id_name":"VERCEL_PROJECT_ID_APEX"}')
          fi
          if should_run switchboard "$SB"; then
            items+=('{"app":"switchboard","path":"examples/switchboard","project_id_name":"VERCEL_PROJECT_ID_SWITCHBOARD"}')
          fi
          if should_run roster "$ROSTER"; then
            items+=('{"app":"roster","path":"examples/roster","project_id_name":"VERCEL_PROJECT_ID_ROSTER"}')
          fi
          if should_run forge "$FORGE"; then
            items+=('{"app":"forge","path":"examples/forge","project_id_name":"VERCEL_PROJECT_ID_FORGE"}')
          fi

          if [[ ${#items[@]} -eq 0 ]]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            echo "No apps to deploy."
            exit 0
          fi

          joined=$(IFS=,; echo "${items[*]}")
          echo "any=true" >> "$GITHUB_OUTPUT"
          echo "matrix={\"include\":[$joined]}" >> "$GITHUB_OUTPUT"
          echo "Planned: [$joined]"

  deploy:
    name: Deploy ${{ matrix.app }}
    needs: changes
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}
    defaults:
      run:
        working-directory: ${{ matrix.path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Resolve Vercel project ID
        id: resolve
        env:
          VERCEL_PROJECT_ID_DOCS: ${{ secrets.VERCEL_PROJECT_ID_DOCS }}
          VERCEL_PROJECT_ID_MISSION_CONTROL: ${{ secrets.VERCEL_PROJECT_ID_MISSION_CONTROL }}
          VERCEL_PROJECT_ID_QUANTA_DESK: ${{ secrets.VERCEL_PROJECT_ID_QUANTA_DESK }}
          VERCEL_PROJECT_ID_APEX: ${{ secrets.VERCEL_PROJECT_ID_APEX }}
          VERCEL_PROJECT_ID_SWITCHBOARD: ${{ secrets.VERCEL_PROJECT_ID_SWITCHBOARD }}
          VERCEL_PROJECT_ID_ROSTER: ${{ secrets.VERCEL_PROJECT_ID_ROSTER }}
          VERCEL_PROJECT_ID_FORGE: ${{ secrets.VERCEL_PROJECT_ID_FORGE }}
        run: |
          set -euo pipefail
          case "${{ matrix.app }}" in
            docs)             project_id="$VERCEL_PROJECT_ID_DOCS" ;;
            mission-control)  project_id="$VERCEL_PROJECT_ID_MISSION_CONTROL" ;;
            quanta-desk)      project_id="$VERCEL_PROJECT_ID_QUANTA_DESK" ;;
            apex)             project_id="$VERCEL_PROJECT_ID_APEX" ;;
            switchboard)      project_id="$VERCEL_PROJECT_ID_SWITCHBOARD" ;;
            roster)           project_id="$VERCEL_PROJECT_ID_ROSTER" ;;
            forge)            project_id="$VERCEL_PROJECT_ID_FORGE" ;;
            *)                project_id="" ;;
          esac

          if [[ -z "$project_id" ]]; then
            echo "::warning title=${{ matrix.app }} skipped::No Vercel project ID secret is configured for this app (expected VERCEL_PROJECT_ID_$(echo '${{ matrix.app }}' | tr 'a-z-' 'A-Z_')). Create the Vercel project and add the secret, then re-run the workflow."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            {
              echo "### ${{ matrix.app }} skipped"
              echo ""
              echo ":warning: No \`VERCEL_PROJECT_ID_$(echo '${{ matrix.app }}' | tr 'a-z-' 'A-Z_')\` secret configured. Create the Vercel project, copy its ID from the project's settings, and add it to the repo secrets to enable deploys."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "VERCEL_PROJECT_ID=$project_id" >> "$GITHUB_ENV"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Pull Vercel environment
        if: steps.resolve.outputs.skip != 'true'
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Install dependencies
        if: steps.resolve.outputs.skip != 'true'
        run: npm install --no-audit --no-fund

      - name: Build with Vercel
        if: steps.resolve.outputs.skip != 'true'
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy to Vercel
        id: deploy
        if: steps.resolve.outputs.skip != 'true'
        run: |
          url=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "::notice title=${{ matrix.app }} deployed::$url"

      - name: Summary
        if: steps.resolve.outputs.skip != 'true'
        run: |
          {
            echo "### ${{ matrix.app }} deployed"
            echo ""
            echo ":rocket: ${{ steps.deploy.outputs.url }}"
          } >> "$GITHUB_STEP_SUMMARY"
