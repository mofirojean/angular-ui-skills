name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      target:
        description: Which app to deploy
        type: choice
        options:
          - all
          - docs
          - mission-control
          - quanta-desk
        default: all

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  changes:
    name: Plan deploys
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      any: ${{ steps.plan.outputs.any }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - 'docs/**'
              - '.github/workflows/deploy.yml'
            mission-control:
              - 'examples/mission-control/**'
              - '.github/workflows/deploy.yml'
            quanta-desk:
              - 'examples/quanta-desk/**'
              - '.github/workflows/deploy.yml'

      - name: Build deploy matrix
        id: plan
        env:
          DOCS: ${{ steps.filter.outputs.docs }}
          MC: ${{ steps.filter.outputs.mission-control }}
          QD: ${{ steps.filter.outputs.quanta-desk }}
          EVENT: ${{ github.event_name }}
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail

          should_run() {
            local app="$1"
            local changed="$2"
            if [[ "$EVENT" == "workflow_dispatch" ]]; then
              if [[ "$TARGET" == "all" || "$TARGET" == "$app" ]]; then return 0; else return 1; fi
            fi
            if [[ "$changed" == "true" ]]; then return 0; else return 1; fi
          }

          items=()
          if should_run docs "$DOCS"; then
            items+=('{"app":"docs","path":"docs","project_id_name":"VERCEL_PROJECT_ID_DOCS"}')
          fi
          if should_run mission-control "$MC"; then
            items+=('{"app":"mission-control","path":"examples/mission-control","project_id_name":"VERCEL_PROJECT_ID_MISSION_CONTROL"}')
          fi
          if should_run quanta-desk "$QD"; then
            items+=('{"app":"quanta-desk","path":"examples/quanta-desk","project_id_name":"VERCEL_PROJECT_ID_QUANTA_DESK"}')
          fi

          if [[ ${#items[@]} -eq 0 ]]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            echo "No apps to deploy."
            exit 0
          fi

          joined=$(IFS=,; echo "${items[*]}")
          echo "any=true" >> "$GITHUB_OUTPUT"
          echo "matrix={\"include\":[$joined]}" >> "$GITHUB_OUTPUT"
          echo "Planned: [$joined]"

  deploy:
    name: Deploy ${{ matrix.app }}
    needs: changes
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}
    defaults:
      run:
        working-directory: ${{ matrix.path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Resolve Vercel project ID
        env:
          VERCEL_PROJECT_ID_DOCS: ${{ secrets.VERCEL_PROJECT_ID_DOCS }}
          VERCEL_PROJECT_ID_MISSION_CONTROL: ${{ secrets.VERCEL_PROJECT_ID_MISSION_CONTROL }}
          VERCEL_PROJECT_ID_QUANTA_DESK: ${{ secrets.VERCEL_PROJECT_ID_QUANTA_DESK }}
        run: |
          case "${{ matrix.app }}" in
            docs)             echo "VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_DOCS" >> "$GITHUB_ENV" ;;
            mission-control)  echo "VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_MISSION_CONTROL" >> "$GITHUB_ENV" ;;
            quanta-desk)      echo "VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_QUANTA_DESK" >> "$GITHUB_ENV" ;;
          esac

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build with Vercel
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "::notice title=${{ matrix.app }} deployed::$url"

      - name: Summary
        run: |
          {
            echo "### ${{ matrix.app }} deployed"
            echo ""
            echo ":rocket: ${{ steps.deploy.outputs.url }}"
          } >> "$GITHUB_STEP_SUMMARY"
